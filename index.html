<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Our Love Story 💕</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(to bottom,#ffe6f2,#ffd6eb);
}

/* Containers */
.container{
  width:90%;
  max-width:700px;
  margin:40px auto;
  background:white;
  padding:25px;
  border-radius:20px;
  box-shadow:0 8px 25px rgba(255,0,102,0.2);
}

h2{
  color:#cc0066;
  text-align:center;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:2px solid #ffb3d9;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:25px;
  background:#ff0066;
  color:white;
  cursor:pointer;
  margin:10px 5px;
  font-weight:bold;
}

button:hover{
  opacity:0.85;
}

/* Navigation */
.nav{
  text-align:right;
}

/* Hidden */
.hidden{
  display:none;
}

/* Romantic Display Page */
.display-page{
  text-align:center;
}

.split{
  display:flex;
  gap:20px;
  margin-top:20px;
}

.left, .right{
  flex:1;
  background:#fff0f5;
  padding:15px;
  border-radius:15px;
}

/* Secret Heart */
.heart{
  font-size:28px;
  cursor:pointer;
}

/* Proposal Section */
.proposal-box{
  margin-top:30px;
  padding:20px;
  background:#ffe6f2;
  border-radius:20px;
}

.proposal-btn{
  padding:12px 25px;
  margin:10px;
  font-size:16px;
  border-radius:30px;
}

#celebration, #rejection{
  display:none;
  margin-top:20px;
}

.cartoons{
  font-size:60px;
  animation: dance 0.6s infinite alternate;
}

@keyframes dance{
  from{ transform: rotate(-10deg); }
  to{ transform: rotate(10deg); }
}

/* Confetti */
.confetti{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}
</style>
</head>

<body>

<!-- PASSWORD PAGE -->
<div class="container" id="passwordPage">
  <h2>Enter Password 💖</h2>
  <input type="password" id="passwordInput" placeholder="Enter Password">
  <button onclick="checkPassword()">Enter</button>
</div>

<!-- FORM SECTION -->
<div id="formSection" class="hidden">
<div class="container">
  <h2>Create Your Love Page 💕</h2>

  <input id="partner" placeholder="Partner Name">
  <input id="sender" placeholder="Your Name">

  <textarea id="letter" rows="4" placeholder="Write your love letter..."></textarea>

  <textarea id="reasons" rows="3" placeholder="Why I love you (separate by comma)"></textarea>

  <textarea id="dreams" rows="3" placeholder="Future bucket list (separate by comma)"></textarea>

  <input id="secretMsg" placeholder="Secret hidden message">

  <div class="nav">
    <button onclick="generateLink()">Generate Romantic Link 💌</button>
  </div>
</div>
</div>

<!-- DISPLAY PAGE -->
<div id="displaySection" class="hidden">
<div class="container display-page">

  <h2 id="title"></h2>

  <div class="split">
    <div class="left">
      <h3>💌 Love Letter</h3>
      <p id="showLetter"></p>
    </div>

    <div class="right">
      <h3>💖 Why I Love You</h3>
      <ul id="showReasons"></ul>

      <h3>🌍 Our Future</h3>
      <ul id="showDreams"></ul>
    </div>
  </div>

  <div>
    <span class="heart" onclick="secretClick()">❤️</span>
    <p id="secretDisplay"></p>
  </div>

  <!-- Proposal -->
  <div class="proposal-box">
    <h2>Will You Be My Valentine? 💕</h2>

    <button class="proposal-btn" onclick="sayYes()">YES 💖</button>
    <button class="proposal-btn" id="noBtn" onclick="sayNo()">NO 😜</button>

    <div id="celebration">
      <h3>Yayyyyy!!! 💕🎉</h3>
      <div class="cartoons">💃🕺</div>
      <p>Forever together ❤️</p>
    </div>

    <div id="rejection">
      <h3>Oh nooo 🥺</h3>
      <div class="cartoons">😠😢</div>
      <p>I will still love you forever 💔</p>
    </div>
  </div>

</div>
</div>

<canvas class="confetti" id="confetti"></canvas>

<script>

let secretCount=0;

/* Password */
function checkPassword(){
  if(document.getElementById("passwordInput").value==="1904"){
    document.getElementById("passwordPage").classList.add("hidden");

    if(new URLSearchParams(window.location.search).get("data")){
      loadData();
    } else {
      document.getElementById("formSection").classList.remove("hidden");
    }

  }else{
    alert("Wrong Password!");
  }
}

/* Generate Share Link */
function generateLink(){
  const data=btoa(JSON.stringify({
    partner:partner.value,
    sender:sender.value,
    letter:letter.value,
    reasons:reasons.value,
    dreams:dreams.value,
    secret:secretMsg.value
  }));

  const link=window.location.href.split("?")[0]+"?data="+data;
  prompt("Copy this romantic link 💌",link);
}

/* Load Data */
function loadData(){
  document.getElementById("displaySection").classList.remove("hidden");

  const params=new URLSearchParams(window.location.search);
  const data=JSON.parse(atob(params.get("data")));

  title.innerText=`${data.sender} ❤️ ${data.partner}`;
  showLetter.innerText=data.letter;

  data.reasons.split(",").forEach(r=>{
    showReasons.innerHTML+=`<li>${r}</li>`;
  });

  data.dreams.split(",").forEach(d=>{
    showDreams.innerHTML+=`<li>${d}</li>`;
  });

  window.secretMessage=data.secret;
}

/* Secret Heart */
function secretClick(){
  secretCount++;
  if(secretCount==5){
    secretDisplay.innerText=window.secretMessage;
  }
}

/* YES */
function sayYes(){
  document.getElementById("celebration").style.display="block";
  document.getElementById("rejection").style.display="none";
  startConfetti();
}

/* NO */
function sayNo(){
  document.getElementById("rejection").style.display="block";
  document.getElementById("celebration").style.display="none";
}

/* Moving NO button */
const noBtn=document.getElementById("noBtn");
noBtn.addEventListener("mouseover",function(){
  this.style.position="relative";
  this.style.left=Math.random()*150-75+"px";
});

/* Simple Confetti */
function startConfetti(){
  const canvas=document.getElementById("confetti");
  const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  let pieces=[];
  for(let i=0;i<100;i++){
    pieces.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*6+2,
      d:Math.random()*100
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="pink";
    pieces.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
      p.y+=2;
      if(p.y>canvas.height){ p.y=0; }
    });
    requestAnimationFrame(draw);
  }
  draw();
}
</script>

</body>
</html>
