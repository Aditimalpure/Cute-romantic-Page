<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Cute Romantic Page 💕</title>

<style>

/* ===== BODY STYLE ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom, #ffc0cb, #ff69b4);
    text-align: center;
    color: white;
    overflow-x: hidden;
}

/* ===== PASSWORD SCREEN ===== */
#passwordScreen {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #ff1493;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#passwordScreen h2 {
    font-size: 28px;
}

input {
    padding: 12px;
    border-radius: 25px;
    border: none;
    font-size: 18px;
    margin: 15px;
    text-align: center;
}

button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    font-size: 18px;
    font-weight: bold;
    background: white;
    color: #ff1493;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ffe4ec;
}

/* ===== MAIN CONTENT ===== */
#mainContent {
    display: none;
    padding: 30px;
}

/* ===== FLOATING HEARTS ===== */
.heart {
    position: fixed;
    bottom: -10px;
    font-size: 20px;
    animation: floatUp 8s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

/* ===== GALLERY ===== */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    margin-top: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 20px;
    transition: 0.4s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* ===== LOVE STORY ===== */
.story {
    margin-top: 40px;
    background: #ff1493;
    padding: 25px;
    border-radius: 25px;
}

/* ===== DANCE ANIMATION ===== */
.dance {
    font-size: 60px;
    animation: dance 0.5s infinite alternate;
}

@keyframes dance {
    from { transform: rotate(-15deg); }
    to { transform: rotate(15deg); }
}

</style>
</head>

<body>

<!-- ===== PASSWORD SCREEN ===== -->
<div id="passwordScreen">
    <h2>Enter Our Lucky Number 💖</h2>
    <input type="password" id="passwordInput" placeholder="Lucky Number">
    <button onclick="checkPassword()">Enter</button>
</div>

<!-- ===== MAIN CONTENT ===== -->
<div id="mainContent">

<h1>Welcome My Love 💕</h1>

<h2>Our Memories 🥰</h2>
<div class="gallery" id="photoGallery"></div>

<div class="story">
    <h2>Our Love Story 💌</h2>
    <p>
        From strangers to forever 💖 <br><br>
        Every smile, every laugh, every small fight made our bond stronger. <br><br>
        With you, life feels magical and peaceful. <br><br>
        You are my today, tomorrow and always. 💕
    </p>
</div>

<div style="margin-top:40px;">
    <h2>Will You Be My Valentine? 💘</h2>
    <button onclick="sayYes()">YES 💖</button>
</div>

<div id="result"></div>

</div>

<script>

/* ===== PASSWORD (ALREADY SET TO 1904) ===== */
function checkPassword() {
    var entered = document.getElementById("passwordInput").value.trim();
    if (entered === "1904") {
        document.getElementById("passwordScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        startHearts();
    } else {
        alert("Wrong Lucky Number 😜");
    }
}

/* ===== FLOATING HEART BACKGROUND ===== */
function startHearts() {
    setInterval(function () {
        var heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 20) + "px";
        document.body.appendChild(heart);

        setTimeout(function () {
            heart.remove();
        }, 8000);
    }, 500);
}

/* ===== PHOTO GALLERY (ADD NAMES LATER) ===== */
var photos = [
    "photo1.jpg",
    "photo2.jpg",
    "photo3.jpg",
    "photo4.jpg",
    "photo5.jpg",
    "photo6.jpg"
];

var gallery = document.getElementById("photoGallery");

photos.forEach(function(photo) {
    var img = document.createElement("img");
    img.src = photo;
    gallery.appendChild(img);
});

/* ===== YES BUTTON EFFECT ===== */
function sayYes() {
    document.body.style.background = "#ff1493";
    document.getElementById("result").innerHTML =
        "<h1>I Love You So Muchhhh 💕</h1>" +
        "<div class='dance'>💃🕺</div>" +
        "<h2>Forever Mine 💖</h2>";

    for (var i = 0; i < 60; i++) {
        var heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 30 + 30) + "px";
        document.body.appendChild(heart);
    }
}

</script>

</body>
</html>
