<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Our Forever Love 💕</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#ffccdf;
  overflow-x:hidden;
}

/* Floating Hearts Background */
.heart-bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
  pointer-events:none;
}

.heart-bg span{
  position:absolute;
  color:#ff4da6;
  font-size:18px;
  animation: float 8s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);opacity:1;}
  100%{transform:translateY(-10vh);opacity:0;}
}

/* Container */
.container{
  width:90%;
  max-width:850px;
  margin:40px auto;
  background:#ffe6f2;
  padding:25px;
  border-radius:20px;
  box-shadow:0 8px 25px rgba(255,0,120,0.3);
}

h2{
  text-align:center;
  color:#cc0066;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:2px solid #ff99cc;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:25px;
  background:#ff3399;
  color:white;
  cursor:pointer;
  margin:10px 5px;
  font-weight:bold;
}

button:hover{opacity:0.8;}

.hidden{display:none;}
.nav{text-align:right;}

img.preview{
  width:100px;
  margin:5px;
  border-radius:10px;
}

.split{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.left,.right{
  flex:1;
  background:white;
  padding:15px;
  border-radius:15px;
}

/* Proposal */
.proposal{
  margin-top:50px;
  text-align:center;
  padding:30px;
  background:#ffb3d9;
  border-radius:20px;
}

.cartoons{
  font-size:60px;
  animation:dance 0.5s infinite alternate;
}

@keyframes dance{
  from{transform:rotate(-10deg);}
  to{transform:rotate(10deg);}
}

#celebration,#rejection{display:none;}
</style>
</head>

<body>

<div class="heart-bg" id="heartBg"></div>

<!-- PASSWORD -->
<div class="container" id="passwordPage">
<h2>Enter Password 💖</h2>
<input type="password" id="passwordInput">
<button onclick="checkPassword()">Enter</button>
</div>

<!-- FORM SECTION -->
<div id="formSection" class="hidden">

<!-- Page 1 -->
<div class="container step">
<h2>Basic Details 💕</h2>
<input id="partner" placeholder="Partner Name">
<input id="sender" placeholder="Your Name">
<input id="date" placeholder="Special Date">
<input type="file" id="banner">
<div class="nav">
<button onclick="nextStep()">Next →</button>
</div>
</div>

<!-- Page 2 -->
<div class="container step hidden">
<h2>Our 3 Love Stories 💌</h2>
<textarea id="story1" placeholder="Love Story 1"></textarea>
<textarea id="story2" placeholder="Love Story 2"></textarea>
<textarea id="story3" placeholder="Love Story 3"></textarea>
<div class="nav">
<button onclick="prevStep()">Back</button>
<button onclick="nextStep()">Next →</button>
</div>
</div>

<!-- Page 3 -->
<div class="container step hidden">
<h2>Upload Memories 📸</h2>
<input type="file" id="photos" multiple>
<div id="preview"></div>
<div class="nav">
<button onclick="prevStep()">Back</button>
<button onclick="nextStep()">Next →</button>
</div>
</div>

<!-- Page 4 -->
<div class="container step hidden">
<h2>Love Letter & More 💖</h2>
<textarea id="letter" placeholder="Love Letter"></textarea>
<textarea id="reasons" placeholder="Why I love you (comma separated)"></textarea>
<textarea id="dreams" placeholder="Future Bucket List (comma separated)"></textarea>
<input id="secret" placeholder="Secret Hidden Message">
<div class="nav">
<button onclick="prevStep()">Back</button>
<button onclick="generateLink()">Generate Romantic Link 💕</button>
</div>
</div>

</div>

<!-- DISPLAY SECTION -->
<div id="displaySection" class="hidden">
<div class="container">

<h2 id="title"></h2>
<p><b>Special Date:</b> <span id="showDate"></span></p>

<h3>💌 Our Love Stories</h3>
<p id="showStory1"></p>
<p id="showStory2"></p>
<p id="showStory3"></p>

<div id="showImages"></div>

<div class="split">
<div class="left">
<h3>Love Letter</h3>
<p id="showLetter"></p>
</div>
<div class="right">
<h3>Why I Love You</h3>
<ul id="showReasons"></ul>
<h3>Our Future</h3>
<ul id="showDreams"></ul>
</div>
</div>

<div style="text-align:center;margin-top:20px;">
<span style="font-size:30px;cursor:pointer;" onclick="secretClick()">❤️</span>
<p id="secretDisplay"></p>
</div>

<!-- FINAL PROPOSAL (APPEARS LAST) -->
<div class="proposal">
<h2>Will You Be My Valentine? 💕</h2>
<button onclick="sayYes()">YES 💖</button>
<button id="noBtn" onclick="sayNo()">NO 😜</button>

<div id="celebration">
<h3>Yayyyy Forever 💕</h3>
<div class="cartoons">💃🕺</div>
</div>

<div id="rejection">
<h3>Nooo 🥺</h3>
<div class="cartoons">😠😢</div>
</div>

</div>

</div>
</div>

<script>

/* Floating Hearts */
for(let i=0;i<40;i++){
let span=document.createElement("span");
span.innerHTML="❤";
span.style.left=Math.random()*100+"%";
span.style.animationDuration=5+Math.random()*5+"s";
document.getElementById("heartBg").appendChild(span);
}

let current=0;
let secretCount=0;
let uploadedImages=[];

/* Password */
function checkPassword(){
if(passwordInput.value==="1904"){
passwordPage.classList.add("hidden");
if(new URLSearchParams(window.location.search).get("data")){
loadData();
}else{
formSection.classList.remove("hidden");
}
}else{alert("Wrong Password");}
}

/* Step Navigation */
function nextStep(){
let steps=document.querySelectorAll(".step");
steps[current].classList.add("hidden");
current++;
steps[current].classList.remove("hidden");
}

function prevStep(){
let steps=document.querySelectorAll(".step");
steps[current].classList.add("hidden");
current--;
steps[current].classList.remove("hidden");
}

/* Image Upload */
photos.addEventListener("change",function(){
preview.innerHTML="";
uploadedImages=[];
Array.from(this.files).forEach(file=>{
let reader=new FileReader();
reader.onload=e=>{
uploadedImages.push(e.target.result);
preview.innerHTML+=`<img src="${e.target.result}" class="preview">`;
}
reader.readAsDataURL(file);
});
});

/* Generate Link */
function generateLink(){
const data=btoa(JSON.stringify({
partner:partner.value,
sender:sender.value,
date:date.value,
story1:story1.value,
story2:story2.value,
story3:story3.value,
letter:letter.value,
reasons:reasons.value,
dreams:dreams.value,
secret:secret.value,
images:uploadedImages
}));
const link=location.href.split("?")[0]+"?data="+data;
prompt("Copy this romantic link 💕",link);
}

/* Load Data */
function loadData(){
formSection.classList.add("hidden");
displaySection.classList.remove("hidden");

const data=JSON.parse(atob(new URLSearchParams(window.location.search).get("data")));

title.innerText=data.sender+" ❤️ "+data.partner;
showDate.innerText=data.date;
showStory1.innerText=data.story1;
showStory2.innerText=data.story2;
showStory3.innerText=data.story3;
showLetter.innerText=data.letter;

data.reasons.split(",").forEach(r=>{
showReasons.innerHTML+=`<li>${r}</li>`;
});
data.dreams.split(",").forEach(d=>{
showDreams.innerHTML+=`<li>${d}</li>`;
});
data.images.forEach(img=>{
showImages.innerHTML+=`<img src="${img}" class="preview">`;
});
window.secretMsg=data.secret;
}

/* Secret */
function secretClick(){
secretCount++;
if(secretCount==5){
secretDisplay.innerText=window.secretMsg;
}
}

/* Proposal */
function sayYes(){
celebration.style.display="block";
rejection.style.display="none";
}

function sayNo(){
rejection.style.display="block";
celebration.style.display="none";
}

noBtn.addEventListener("mouseover",function(){
this.style.position="relative";
this.style.left=Math.random()*200-100+"px";
});

</script>
</body>
</html>
