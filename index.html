<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Our Love Story 💕</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #ffb6c1, #ff69b4);
    text-align:center;
    color:white;
    overflow-x:hidden;
}

/* Password Screen */
#passwordScreen{
    position:fixed;
    width:100%;
    height:100vh;
    background:#ff1493;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

input{
    padding:12px;
    border:none;
    border-radius:20px;
    font-size:18px;
    margin:10px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    font-size:18px;
    cursor:pointer;
    background:white;
    color:#ff1493;
    font-weight:bold;
}

#mainContent{
    display:none;
    padding:30px;
}

/* Floating Hearts */
.heart{
    position:fixed;
    bottom:-10px;
    animation:floatUp 8s linear infinite;
    color:white;
}

@keyframes floatUp{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-100vh);opacity:0;}
}

/* Gallery */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    margin-top:20px;
}

.gallery img{
    width:100%;
    border-radius:20px;
    transition:0.4s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* Love Story */
.story{
    margin-top:40px;
    background:#ff1493;
    padding:25px;
    border-radius:25px;
}

/* Dance Animation */
.dance{
    font-size:60px;
    animation:dance 0.5s infinite alternate;
}

@keyframes dance{
    from{transform:rotate(-15deg);}
    to{transform:rotate(15deg);}
}

.fadeIn{
    animation:fadeIn 1.5s ease-in;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<!-- PASSWORD -->
<div id="passwordScreen">
    <h2>Enter Our Lucky Number 💖</h2>
    <input type="password" id="passwordInput" placeholder="Lucky Number">
    <button onclick="checkPassword()">Enter</button>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent" class="fadeIn">

<h1>Welcome My Love 💕</h1>

<h2>Our Memories 🥰</h2>
<div class="gallery" id="photoGallery"></div>

<div class="story">
<h2>Our Love Story 💌</h2>
<p>
From strangers to forever 💖  
Every smile, every laugh, every little fight made our bond stronger.  
With you, life feels magical and peaceful.  
You are my today, tomorrow and always. 💕
</p>
</div>

<div style="margin-top:40px;">
<h2>Will You Be My Valentine? 💘</h2>
<button onclick="sayYes()">YES 💖</button>
</div>

<div id="result"></div>

</div>

<script>

// 🔐 CHANGE THIS TO YOUR LUCKY NUMBER
const correctPassword = "143";

// 📸 ADD YOUR PHOTO FILE NAMES HERE (ANY NAME)
const photos = [
    "photo1.jpg",
    "photo2.jpg",
    "photo3.jpg",
    "photo4.jpg",
    "photo5.jpg",
    "photo6.jpg"
];

// Display Photos Automatically
const gallery = document.getElementById("photoGallery");
photos.forEach(photo=>{
    const img=document.createElement("img");
    img.src=photo;
    gallery.appendChild(img);
});

// Password Check
function checkPassword(){
    let entered=document.getElementById("passwordInput").value;
    if(entered===correctPassword){
        document.getElementById("passwordScreen").style.display="none";
        document.getElementById("mainContent").style.display="block";
        startHearts();
    }else{
        alert("Wrong Lucky Number 😜");
    }
}

// Floating Hearts
function startHearts(){
    setInterval(()=>{
        let heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="💖";
        heart.style.left=Math.random()*100+"vw";
        heart.style.fontSize=(Math.random()*20+20)+"px";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),8000);
    },500);
}

// YES BUTTON EFFECT
function sayYes(){
    document.body.style.background="#ff1493";
    document.getElementById("result").innerHTML=`
        <h1>I Love You So Muchhhh 💕</h1>
        <div class="dance">💃🕺</div>
        <h2>Forever Mine 💖</h2>
    `;

    for(let i=0;i<60;i++){
        let heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="💖";
        heart.style.left=Math.random()*100+"vw";
        heart.style.fontSize=(Math.random()*30+30)+"px";
        document.body.appendChild(heart);
    }
}
</script>

</body>
</html>
